<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Boot To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>To Do List</h1>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Thêm công việc mới...">
            <button onclick="addTask()">Thêm</button>
        </div>
        <div class="filter-section">
            <input type="text" id="searchInput" placeholder="Tìm kiếm công việc..." oninput="fetchTasks()">
            <select id="statusFilter" onchange="fetchTasks()">
                <option value="all">Tất cả trạng thái</option>
                <option value="completed">Đã hoàn thành</option>
                <option value="pending">Chưa hoàn thành</option>
            </select>
        </div>
        <ul id="taskList">
            </ul>
    </div>

        <ul id="taskList">
    <script src="script.js"></script>
</body>
</html>
